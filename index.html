<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页音乐播放器-郑伟皓_24215220223</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div class="bg-layer" id="bg-layer"></div>

    <div class="player-container">
        <header class="header">
            <h1>音乐在线播放-开发人：郑伟皓 (学号: 24215220223)</h1>
        </header>

        <main class="main-content">
            <div class="record-wrapper">
                <div class="record" id="record">
                    <img src="./img/record0.jpg" id="cover-img" alt="专辑封面">
                </div>
            </div>
            <div class="song-info">
                <h2 id="song-title">歌曲名称</h2>
                <p id="song-artist">歌手：未知</p>
            </div>
        </main>

        <footer class="control-bar">
            <audio id="audio-player" src="./mp3/music0.mp3"></audio>

            <div class="progress-container">
                <span id="current-time">00:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                <span id="duration">00:00</span>
            </div>

            <div class="controls">
                <img src="./img/上一首.png" id="btn-prev" class="btn" alt="上一首">
                <img src="./img/继续播放.png" id="btn-play" class="btn play-btn" alt="播放/暂停">
                <img src="./img/下一首.png" id="btn-next" class="btn" alt="下一首">
                
                <div class="volume-control">
                    <img src="./img/音量.png" class="icon" alt="音量">
                    <input type="range" id="volume-bar" min="0" max="1" value="0.5" step="0.01">
                </div>
                
                <img src="./img/MV.png" id="btn-mv" class="icon" alt="播放MV" title="观看MV">
                
                <img src="./img/列表.png" id="btn-list" class="icon" alt="播放列表">
            </div>
        </footer>
    </div>

    <div class="video-overlay" id="video-overlay">
        <div class="video-container">
            <span class="close-btn" id="close-video">关闭 ✖</span>
            <video id="mv-player" controls></video> 
        </div>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
